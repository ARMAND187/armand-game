<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #000; color: white; display: flex; align-items: center; gap: 20px; padding: 50px; }
  .avatar-container { position: relative; width: 64px; height: 64px; flex-shrink: 0; }
  .avatar { width: 100%; height: 100%; border-radius: 50%; background: cyan; }
  .frame { position: absolute; top: -8px; left: -8px; width: 80px; height: 80px; z-index: 2; pointer-events: none; }
  .flair-container { display: inline-flex; align-items: center; gap: 6px; max-width: 100%; }
</style>
</head>
<body>

  <div class="avatar-container">
    <div class="avatar"></div>
    <div class="frame">
      <svg width="100%" height="100%" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="w2grad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#c79bff"/>
            <stop offset="100%" stop-color="#6a2fb0"/>
          </linearGradient>
        </defs>
        <circle cx="50" cy="50" r="46" fill="none" stroke="url(#w2grad)" stroke-width="6"/>
      </svg>
    </div>
  </div>

  <div class="flair-container">
    <svg width="220" height="56" viewBox="0 0 220 56" xmlns="http://www.w3.org/2000/svg">
      <rect x="3" y="3" width="214" height="50" rx="25" fill="#2a0f0a" stroke="#ff7a3d" stroke-width="2.2"/>
      <path d="M30 18c-5 5-8 9-8 14 0 5 3.5 9 8 9s8-4 8-9c0-3-1.5-5-2.5-6.5 0 2-1 3-2 3 .5-3.5-.5-6.5-3.5-10.5z" fill="#ff7a3d"/>
      <text x="50" y="34" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#ff7a3d">armand</text>
    </svg>
  </div>

</body>
</html>
