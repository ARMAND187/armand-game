<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #000; color: white; display: flex; align-items: center; gap: 20px; padding: 50px; font-family: sans-serif; }
</style>
</head>
<body>

  <!-- Mock Header Layout -->
  <div style="position: relative; width: 100%; height: 120px; display: flex; align-items: center; padding: 20px;">
    
    <!-- Avatar -->
    <div style="position: relative; width: 64px; height: 64px; margin-right: 20px;">
      <!-- Avatar Image -->
      <div style="width: 100%; height: 100%; border-radius: 50%; background: cyan;"></div>
      
      <!-- Violet Ring Frame -->
      <div style="position: absolute; top: -8px; left: -8px; width: 80px; height: 80px; z-index: 2; pointer-events: none;">
        <svg width="100%" height="100%" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="w2grad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#c79bff"/>
              <stop offset="100%" stop-color="#6a2fb0"/>
            </linearGradient>
          </defs>
          <circle cx="50" cy="50" r="46" fill="none" stroke="url(#w2grad)" stroke-width="6"/>
        </svg>
      </div>
    </div>

    <!-- Username -->
    <div>
      <h1 style="display: flex; align-items: center; gap: 8px; margin: 0;">
        <!-- Dynamic Flame Flair Pill -->
        <div style="display: inline-flex; align-items: center; gap: 2px; background: #2a0f0a; border: 2px solid #ff7a3d; padding: 2px 10px 2px 4px; border-radius: 9999px; max-width: 100%;">
          <div style="display: flex; align-items: center; margin-left: -4px; margin-right: -2px;">
            <svg width="24" height="24" viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg">
              <path d="M30 18c-5 5-8 9-8 14 0 5 3.5 9 8 9s8-4 8-9c0-3-1.5-5-2.5-6.5 0 2-1 3-2 3 .5-3.5-.5-6.5-3.5-10.5z" fill="#ff7a3d"/>
            </svg>
          </div>
          <span style="color: #ff7a3d; font-weight: 800; font-size: 12px;">armand</span>
        </div>
      </h1>
    </div>

  </div>

</body>
</html>
