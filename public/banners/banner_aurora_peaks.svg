<svg width="400" height="90" viewBox="0 0 400 90" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Deep night-blue sky -->
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0f25"/>
      <stop offset="60%" stop-color="#141e46"/>
      <stop offset="100%" stop-color="#2a3b68"/>
    </linearGradient>

    <!-- Aurora Waves -->
    <linearGradient id="aurora1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4facfe" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="aurora2" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#b026ff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#fdfbfb" stop-opacity="0"/>
    </linearGradient>

    <!-- Smooth Mountain silhouettes -->
    <linearGradient id="mtBack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#152042"/>
      <stop offset="100%" stop-color="#0d142b"/>
    </linearGradient>
    <linearGradient id="mtFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d142b"/>
      <stop offset="100%" stop-color="#050812"/>
    </linearGradient>
    
    <clipPath id="bannerClip">
      <rect x="0" y="0" width="400" height="90" rx="10"/>
    </clipPath>
  </defs>

  <g clip-path="url(#bannerClip)">
    <!-- Sky background -->
    <rect width="400" height="90" fill="url(#skyGrad)"/>

    <!-- Stars -->
    <g fill="#ffffff" opacity="0.8">
      <circle cx="45" cy="15" r="0.8"/>
      <circle cx="85" cy="25" r="0.6"/>
      <circle cx="120" cy="10" r="1"/>
      <circle cx="180" cy="20" r="0.7"/>
      <circle cx="220" cy="8" r="0.5"/>
      <circle cx="270" cy="28" r="0.8"/>
      <circle cx="310" cy="12" r="1.2"/>
      <circle cx="360" cy="22" r="0.6"/>
      <circle cx="390" cy="15" r="0.9"/>
    </g>

    <!-- Aurora Waves -->
    <path d="M-20 40 Q 80 0, 180 30 T 300 20 T 420 40 L 420 0 L -20 0 Z" fill="url(#aurora1)" opacity="0.8"/>
    <path d="M-20 60 Q 100 10, 200 45 T 350 15 T 420 50 L 420 0 L -20 0 Z" fill="url(#aurora2)" opacity="0.7"/>

    <!-- Smooth Layered Hills/Mountains (Back) -->
    <path d="M0 65 
             C 40 40, 80 40, 120 55 
             C 160 70, 200 30, 240 45 
             C 280 60, 320 35, 360 45 
             C 380 50, 390 55, 400 60 
             L 400 90 L 0 90 Z" fill="url(#mtBack)"/>

    <!-- Smooth Layered Hills/Mountains (Front) -->
    <path d="M-10 90 
             C 30 70, 70 60, 110 75 
             C 150 90, 190 55, 230 65 
             C 270 75, 310 50, 350 65 
             C 380 75, 390 80, 410 90 Z" fill="url(#mtFront)"/>

  </g>
</svg>
